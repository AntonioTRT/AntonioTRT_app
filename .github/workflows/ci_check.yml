name: CI Check - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    # ========== ARDUINO FIRMWARE BUILD ==========
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v1

    - name: Create arduino-cli config
      run: |
        mkdir -p ~/.config/arduino15
        arduino-cli config init --overwrite

    - name: Update Arduino core index
      run: arduino-cli core update-index

    - name: Install Arduino AVR core (for Arduino Uno)
      run: arduino-cli core install arduino:avr

    - name: Build firmware for Arduino Uno
      run: |
        cd firmware/arduino-uno
        arduino-cli compile --fqbn arduino:avr:uno . \
          --output-dir ./build \
          --verbose
      continue-on-error: true

    # ========== PYTHON TESTS ==========
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pyyaml

    - name: Install app dependencies
      run: |
        pip install -r trtappUI/py/requirements.txt

    - name: Run unit tests
      run: |
        pytest tests/test_core.py -v --tb=short

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=core --cov=trtappUI/py/controller \
          --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

    # ========== CODE QUALITY ==========
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop build on syntax errors or undefined names
        flake8 core/ trtappUI/py/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

    - name: Check type hints with mypy
      run: |
        pip install mypy
        mypy core/trtmsg.py --ignore-missing-imports
      continue-on-error: true

  # ========== BUILD STATUS ==========
  build-status:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    
    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.build-and-test.result }}" == "success" ]; then
          echo "✓ Build successful!"
          exit 0
        else
          echo "✗ Build failed!"
          exit 1
        fi
